<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Most Famous Yoga Master</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0d0a1a 0%, #1a0f2e 30%, #2d1b4e 60%, #1a0f2e 85%, #0d0a1a 100%);
      font-family: 'Cormorant Garamond', serif;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(212, 175, 55, 0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(233, 69, 96, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 700px;
      width: 100%;
      animation: fadeIn 1.8s ease-out;
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(2.2rem, 7vw, 4.2rem);
      color: #f5e6c8;
      text-shadow: 0 2px 40px rgba(212, 175, 55, 0.3);
      line-height: 1.15;
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
    }
    h1 span {
      display: block;
      font-weight: 400;
      font-style: italic;
      font-size: 0.55em;
      color: #c9a96e;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-top: 0.5rem;
      text-shadow: none;
    }
    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9a96e, transparent);
      margin: 1.5rem auto;
      opacity: 0.6;
    }
    .img-wrapper {
      position: relative;
      display: inline-block;
      margin-top: 0.5rem;
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(212, 175, 55, 0.15);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      max-width: 100%;
    }
    .img-wrapper:hover {
      transform: scale(1.02);
      box-shadow:
        0 40px 100px rgba(0, 0, 0, 0.7),
        0 0 0 2px rgba(212, 175, 55, 0.25);
    }
    .img-wrapper img {
      display: block;
      width: 100%;
      max-width: 480px;
      height: auto;
      border-radius: 24px;
      transition: filter 0.5s ease;
    }
    @media (max-width: 540px) {
      body { padding: 1.5rem; }
      .img-wrapper img { max-width: 100%; }
      .img-wrapper { border-radius: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      World Most Famous
      <span>Yoga Master</span>
    </h1>
    <div class="divider"></div>
    <div class="img-wrapper">
      <img src="img.jpeg" alt="World Most Famous Yoga Master">
    </div>
  </div>
</body>
</html>
